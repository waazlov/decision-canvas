services:
  - type: web
    name: decisioncanvas-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /system/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
